<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Smart Meeting Room Allocator</title>
  <link rel="stylesheet" href="CSS/styles.css"/>
</head>
<body>

<div class="layout">

  <!-- ══ SIDEBAR: Request Form ══════════════════════════════════════════ -->
  <aside class="sidebar">
    <h1>Room Allocator</h1>
    <p class="sub">AI-powered meeting room assignment</p>

    <div class="form-group">
      <label for="meetingName">Meeting name</label>
      <input type="text" id="meetingName" placeholder="e.g. Sprint Planning"/>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date"/>
    </div>

    <div class="row-2">
      <div class="form-group">
        <label for="startTime">Start time</label>
        <input type="time" id="startTime" value="09:00"/>
      </div>
      <div class="form-group">
        <label for="endTime">End time</label>
        <input type="time" id="endTime" value="10:00"/>
      </div>
    </div>

    <div class="form-group">
      <label for="attendees">Attendees</label>
      <input type="number" id="attendees" min="1" max="60" placeholder="e.g. 15"/>
    </div>

    <div class="form-group">
      <label for="preferredFloor">Preferred floor (0 = any)</label>
      <select id="preferredFloor">
        <option value="0">Any floor</option>
        <option value="1">Floor 1</option>
        <option value="2">Floor 2</option>
        <option value="3">Floor 3</option>
      </select>
    </div>

    <div class="form-group">
      <label>Required equipment</label>
      <div class="checkgroup" id="equipChips"></div>
    </div>

    <div class="form-group">
      <label>Nice to have</label>
      <div class="checkgroup" id="niceChips"></div>
    </div>

    <button class="btn" onclick="runAgent()">Find best room</button>
  </aside>

  <!-- ══ MAIN: Results ══════════════════════════════════════════════════ -->
  <main class="main" id="mainPanel">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="24" height="24" fill="none" stroke="#5346b5" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
      </div>
      <strong>No request yet</strong>
      <span style="font-size:13px">Fill in the form and click "Find best room"</span>
    </div>
  </main>

</div>

<!-- ══ Scripts: load order matters ══════════════════════════════════════
     knowledge-base  →  rules-engine  →  csp  →  search-engine
     →  agent  →  ui  →  main (entry point)
     Each file depends on the ones before it.
 ══════════════════════════════════════════════════════════════════════ -->
<script src="js/knowledge-base.js"></script>
<script src="js/rules-engine.js"></script>
<script src="js/csp.js"></script>
<script src="js/search-engine.js"></script>
<script src="js/agent.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
